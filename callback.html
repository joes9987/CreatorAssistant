<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CreatorAssistant — Authorization</title>
  <link rel="icon" type="image/png" href="assets/CreatorAssistant-icon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-link">&larr; Back to CreatorAssistant</a>

    <header class="hero">
      <img src="assets/CreatorAssistant-icon.png" alt="CreatorAssistant icon" class="hero-icon">
      <h1 id="title">Redirecting…</h1>
      <p class="tagline" id="message">Sending authorization back to CreatorAssistant on your PC.</p>
    </header>

    <section class="card" id="error-card" style="display: none;">
      <h2>Authorization failed</h2>
      <p id="error-detail"></p>
      <p>Return to the CreatorAssistant window and check the log panel for details.</p>
    </section>

    <footer class="footer">
      <p>&copy; 2026 CreatorAssistant &nbsp;·&nbsp;
        <a class="inline-link" href="CreatorAssistant-terms.html">Terms of Service</a> &nbsp;·&nbsp;
        <a class="inline-link" href="CreatorAssistant-privacy.html">Privacy Policy</a>
      </p>
    </footer>
  </div>
  <script>
    (function () {
      // Must match instagram.local_oauth_port in config.yaml (default 8081).
      var LOCAL_PORT = 8081;
      var params = window.location.search;
      var qs = new URLSearchParams(params);
      var code = qs.get("code");
      var error = qs.get("error");
      var errorDesc = qs.get("error_description");

      if (error) {
        document.getElementById("title").textContent = "Authorization failed";
        document.getElementById("message").textContent = "CreatorAssistant could not complete sign-in.";
        document.getElementById("error-card").style.display = "block";
        document.getElementById("error-detail").textContent =
          error + (errorDesc ? ": " + errorDesc : "");
        return;
      }

      if (code) {
        var localUrl = "http://127.0.0.1:" + LOCAL_PORT + "/callback" + params;
        window.location.replace(localUrl);
        return;
      }

      document.getElementById("title").textContent = "Authorization complete";
      document.getElementById("message").textContent =
        "You can close this tab and return to CreatorAssistant.";
    })();
  </script>
</body>
</html>
