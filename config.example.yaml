# CreatorAssistant - AI Highlight Detection Config
# Copy to config.yaml and fill in your values. Do NOT commit config.yaml (it contains secrets).

# Default folder for CLI file picker and fallback when no file is chosen (relative to project root).
paths:
  default_input_dir: "input"

# FFmpeg path - leave empty to use PATH. If ffmpeg not found, set full path to bin folder:
ffmpeg_path: ""  # e.g. "C:\\ffmpeg-essentials\\bin"

# Clip output settings (optimized for Shorts/TikTok/Reels)
clip:
  duration_seconds: 30
  padding_before: 10
  padding_after: 2
  min_clip_length: 15
  max_clip_length: 60
  # Final frame aspect (1080-wide). Shorts/Reels/TikTok = 9:16.
  aspect_ratio: "9:16"
  # Default for Shorts: "crop" = strong vertical frame; "fit" = full 16:9 shrunk with letterbox.
  reframe_mode: "crop"
  # Only when reframe_mode is "crop". 10:16 = recommended balance (HUD/minimap + 9:16 delivery).
  # Tighter: "9:16". Wider FOV: "11:16".
  crop_aspect: "10:16"
  output_dir: "outputs"
  crf: 18
  preset: "slow"

# Game events (Riot Live Client Data API)
game_events:
  enabled: true
  file: "game_events.json"
  recording_start_offset: 0
  prefer_events_over_ai: true
  filter_my_kills_only: true
  player_summoner_name: "YOUR_SUMMONER_NAME"
  obs_websocket:
    enabled: true
    host: "localhost"
    port: 4455
    password: ""
    # Requires OBS running with Tools → WebSocket Server Settings enabled.
    auto_start_recording: false  # Start Record on GameStart (or game clock ≥ mid_game_join_recording_game_time_sec)
    auto_stop_recording_on_game_end: false  # Stop Record on GameEnd or Live Client disconnect (debounced)
    live_client_disconnect_stop_seconds: 8   # How long API must be down before treating match as ended
    mid_game_join_recording_game_time_sec: 5  # Fallback start if GameStart event was missed (logger started late)
    obs_recording_start_delay_seconds: 0     # Wait N seconds after GameStart before Start Record (e.g. 5 if recordings hitch)

# YouTube Shorts upload
youtube:
  enabled: false
  client_secrets_file: "client_secrets.json"  # From Google Cloud Console
  title_template: "League Clip {num}"
  clip_counter_start: 1
  description: ""
  tags: []
  privacy: "public"

# TikTok upload
tiktok:
  enabled: false
  client_key: "YOUR_TIKTOK_CLIENT_KEY"
  client_secret: "YOUR_TIKTOK_CLIENT_SECRET"
  redirect_uri: "http://localhost:8080/callback"
  title_template: "League Clip {num}"
  privacy: "PUBLIC_TO_EVERYONE"

# Instagram Reels upload (Instagram API with Instagram Login)
# One-time Meta dashboard setup (API setup with Instagram login):
#   1. Step 4 — OAuth redirect URI: https://creator-assistant.vercel.app/callback.html
#      (exact match; also add under Facebook Login for Business → Valid OAuth Redirect URIs if shown)
#   2. App settings → Basic → Native/desktop app ON; Authorize callback URL = same HTTPS URL above
#   3. Copy Instagram App ID + Secret from this setup page (NOT the top-level Facebook App ID)
#   4. Enable instagram_business_content_publish scope; add your IG professional account in Step 2
# After first browser login, tokens are saved to instagram_token.json and auto-refreshed (~60 days).
instagram:
  enabled: false
  instagram_app_id: "YOUR_INSTAGRAM_APP_ID"
  instagram_app_secret: "YOUR_INSTAGRAM_APP_SECRET"
  # Legacy aliases still supported: app_id / app_secret
  redirect_uri: "https://creator-assistant.vercel.app/callback.html"
  local_oauth_port: 8081  # Local listener; must match LOCAL_PORT in callback.html on Vercel
  oauth_scopes: "instagram_business_basic,instagram_business_content_publish"
  ig_user_id: "YOUR_INSTAGRAM_USER_ID"
  # Leave empty — app uses instagram_token.json + OAuth (do not paste dashboard tokens)
  access_token: ""
  title_template: "League Clip {num}"

# AI detection
detection:
  audio_weight: 0.5
  motion_weight: 0.5
  sensitivity: 0.5
  min_score: 0.6
  min_prominence: 0.15
  min_seconds_between_clips: 120
  max_clips_per_video: 15
  window_seconds: 4
